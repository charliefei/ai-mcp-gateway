# =============================================================================
# ai-mcp-gateway-admin-ui · nginx.conf
#
# Serves the Vite-built SPA on port 80 and reverse-proxies /api-gateway/ to
# the Spring Boot backend (configured via BACKEND_URL at image build time).
#
# Placeholder __BACKEND_URL__ is replaced by the Dockerfile's `sed` step.
# Override at build time:
#   docker build --build-arg BACKEND_URL=http://my-backend:8777 .
# =============================================================================

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # Don't advertise the version.
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    charset utf-8;

    # Reasonable client limits for the admin console.
    client_max_body_size 16m;
    keepalive_timeout     65;

    # --- Security & framing headers ---------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy    "geolocation=(), microphone=(), camera=()" always;

    # Note: CSP is intentionally left to the SPA's own <meta> tag so the
    # Google Fonts preconnect in index.html keeps working.

    # --- gzip -------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/otf;

    # --- API + MCP proxy --------------------------------------------------
    # The Spring Boot gateway listens on its own port with context-path
    # /api-gateway. The Vite dev server already proxies /api-gateway → :8777,
    # we mirror that here. SSE (MCP streamable transport) needs HTTP/1.1,
    # disabled buffering, and an unbuffered upstream connection.
    location /api-gateway/ {
        proxy_pass         __BACKEND_URL__;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Long timeouts for SSE / long-lived MCP streams.
        proxy_connect_timeout 30s;
        proxy_send_timeout    1h;
        proxy_read_timeout    1h;

        # Critical for SSE: do not buffer streamed responses.
        proxy_buffering       off;
        proxy_cache           off;
        proxy_request_buffering off;
    }

    # --- Hashed Vite assets: long-lived cache -----------------------------
    # Vite emits content-hashed filenames under /assets/, so it's safe to
    # cache them aggressively.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # --- Public files (favicon, etc.) -------------------------------------
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|otf)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # --- SPA fallback -----------------------------------------------------
    # Anything that isn't a real file or an API call serves index.html so
    # react-router-dom v7's client-side routes work on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, otherwise new deployments don't show.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache" always;
        add_header Expires       "0" always;
    }

    # --- Health endpoint ---------------------------------------------------
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

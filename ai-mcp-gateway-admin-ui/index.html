<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="MCP Gateway - 将任意 HTTP API 转换为 MCP 工具的管理控制台"
    />
    <title>MCP Gateway · 控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Prevent flash of unstyled content (FOUC) */
      html.dark {
        color-scheme: dark;
      }
      html:not(.dark) {
        color-scheme: light;
      }
      /* Initial loader — visible until React hydrates */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, hsl(243 75% 59% / 0.08), transparent 50%),
          hsl(var(--background, 0 0% 100%));
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
